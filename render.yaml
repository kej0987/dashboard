services:
  - type: web
    name: elicelab-dashboard
    runtime: python
    plan: free                      # 항상 켜두려면 starter($7/월)로 변경
    buildCommand: pip install -r requirements.txt
    # 인메모리 세션 상태 때문에 워커/인스턴스는 반드시 1개로 고정
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: ANTHROPIC_API_KEY      # Render 대시보드에서 값 입력(sync:false)
        sync: false
